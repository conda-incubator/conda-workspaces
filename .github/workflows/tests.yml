name: Tests

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tests.yml"
      - "conda_workspaces/**"
      - "pixi.lock"
      - "pyproject.toml"
      - "tests/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/tests.yml"
      - "conda_workspaces/**"
      - "pixi.lock"
      - "pyproject.toml"
      - "tests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          environments: dev
      - name: Lint
        run: pixi run -e dev lint
      - name: Format check
        run: pixi run -e dev format-check

  tests:
    name: ${{ matrix.os }}, Python 3.${{ matrix.python-minor }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-minor: ["10", "11", "12", "13", "14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          environments: test-py3${{ matrix.python-minor }}
      - name: Run tests
        run: pixi run -e test-py3${{ matrix.python-minor }} test-cov
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-minor == '13'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: ${{ github.event_name != 'pull_request' }}
          token: ${{ secrets.CODECOV_TOKEN }}
